<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Cute To-Do ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pink:      #ffb3d1;
      --pink-deep: #f582ae;
      --lavender:  #cdb4db;
      --blue:      #a2d2ff;
      --cream:     #fff8f0;
      --white-gl:  rgba(255,255,255,0.55);
      --shadow:    rgba(200,150,180,0.25);
      --text:      #6b4f6b;
      --text-soft: #b08fa8;
      --low:       #a8d8a8;
      --med:       #ffcba4;
      --high:      #ff9eb5;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(135deg, #ffd6e8 0%, #e8d5f5 30%, #c9e8ff 65%, #ffecd2 100%);
      background-attachment: fixed;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px 60px;
      overflow-x: hidden;
      color: var(--text);
    }
    .blobs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .blob { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.35; animation: drift linear infinite; }
    .blob-1 { width:320px; height:320px; background:#ffb3d1; top:-80px;   left:-80px;  animation-duration:22s; }
    .blob-2 { width:260px; height:260px; background:#cdb4db; top:30%;    right:-60px; animation-duration:18s; animation-delay:-6s; }
    .blob-3 { width:200px; height:200px; background:#a2d2ff; bottom:10%; left:10%;   animation-duration:26s; animation-delay:-12s; }
    .blob-4 { width:180px; height:180px; background:#ffd6a5; bottom:-40px; right:15%; animation-duration:20s; animation-delay:-3s; }
    @keyframes drift {
      0%   { transform: translate(0,0) scale(1); }
      25%  { transform: translate(30px,-20px) scale(1.05); }
      50%  { transform: translate(10px,30px) scale(0.95); }
      75%  { transform: translate(-20px,10px) scale(1.03); }
      100% { transform: translate(0,0) scale(1); }
    }
    .floaties { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .floaty { position:absolute; font-size:1.4rem; opacity:0.55; animation:floatUp linear infinite; user-select:none; }
    @keyframes floatUp {
      0%   { transform:translateY(110vh) rotate(0deg);   opacity:0; }
      10%  { opacity:0.55; }
      90%  { opacity:0.55; }
      100% { transform:translateY(-10vh) rotate(360deg); opacity:0; }
    }
    .card {
      position:relative; z-index:10; width:100%; max-width:480px;
      background:var(--white-gl);
      backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
      border:1.5px solid rgba(255,255,255,0.7); border-radius:32px;
      padding:36px 32px 40px;
      box-shadow: 0 8px 40px var(--shadow), 0 2px 8px rgba(255,255,255,0.6) inset;
    }
    .header { text-align:center; margin-bottom:18px; }
    .title {
      font-family:'Nunito',sans-serif; font-size:2rem; font-weight:800;
      background:linear-gradient(135deg,#f582ae,#a78bfa,#60a5fa);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      line-height:1.2; margin-bottom:6px;
    }
    .quote-box {
      background:linear-gradient(135deg,rgba(255,179,209,0.4),rgba(162,210,255,0.3));
      border:1px solid rgba(255,255,255,0.6); border-radius:16px;
      padding:12px 16px; margin-bottom:24px; text-align:center;
    }
    .quote-label { font-size:0.65rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--pink-deep); margin-bottom:4px; }
    .quote-text  { font-size:0.82rem; color:var(--text); font-style:italic; line-height:1.5; }
    .input-row { display:flex; gap:10px; margin-bottom:10px; }
    .task-input {
      flex:1; padding:13px 18px; border-radius:50px;
      border:2px solid rgba(255,179,209,0.5); background:rgba(255,255,255,0.7);
      font-family:'Quicksand',sans-serif; font-size:0.9rem; font-weight:600; color:var(--text);
      outline:none; transition:border-color 0.25s, box-shadow 0.25s;
    }
    .task-input::placeholder { color:var(--text-soft); }
    .task-input:focus { border-color:var(--pink); box-shadow:0 0 0 4px rgba(255,179,209,0.25); }
    .add-btn {
      padding:13px 20px; border-radius:50px; border:none;
      background:linear-gradient(135deg,#f582ae,#c084fc); color:white;
      font-family:'Nunito',sans-serif; font-size:1.1rem; font-weight:800;
      cursor:pointer; transition:transform 0.15s, box-shadow 0.2s;
      box-shadow:0 4px 18px rgba(245,130,174,0.45); white-space:nowrap;
    }
    .add-btn:hover { transform:scale(1.07); box-shadow:0 6px 24px rgba(192,132,252,0.5); }
    .add-btn:active { transform:scale(0.94); }
    .add-btn.bounce { animation:btnBounce 0.35s ease; }
    @keyframes btnBounce {
      0%  { transform:scale(1); } 40% { transform:scale(0.88); }
      70% { transform:scale(1.12); } 100% { transform:scale(1); }
    }
    .priority-row { display:flex; gap:8px; margin-bottom:22px; justify-content:center; }
    .pri-btn {
      padding:6px 14px; border-radius:50px; border:2px solid transparent;
      font-family:'Quicksand',sans-serif; font-size:0.78rem; font-weight:700;
      cursor:pointer; background:rgba(255,255,255,0.6); color:var(--text-soft);
      transition:all 0.2s;
    }
    .pri-btn[data-p="low"]  { border-color:var(--low);  }
    .pri-btn[data-p="med"]  { border-color:var(--med);  }
    .pri-btn[data-p="high"] { border-color:var(--high); }
    .pri-btn.selected[data-p="low"]  { background:var(--low);  color:#3a6b3a; }
    .pri-btn.selected[data-p="med"]  { background:var(--med);  color:#7a4f20; }
    .pri-btn.selected[data-p="high"] { background:var(--high); color:#7a1a30; }
    .pri-btn:hover { transform:scale(1.06); }
    .stats { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; padding:0 4px; }
    .stats-text { font-size:0.78rem; font-weight:700; color:var(--text-soft); }
    .clear-btn { font-size:0.72rem; font-weight:700; color:var(--pink-deep); background:none; border:none; cursor:pointer; font-family:'Quicksand',sans-serif; opacity:0.8; transition:opacity 0.2s; }
    .clear-btn:hover { opacity:1; text-decoration:underline; }
    .task-list { list-style:none; display:flex; flex-direction:column; gap:10px; }
    .task-item {
      display:flex; align-items:center; gap:12px;
      background:rgba(255,255,255,0.65); border:1.5px solid rgba(255,255,255,0.8);
      border-radius:18px; padding:13px 14px;
      box-shadow:0 3px 14px rgba(200,150,180,0.15);
      animation:fadeSlideIn 0.38s cubic-bezier(0.34,1.56,0.64,1) both;
      transition:box-shadow 0.25s, transform 0.2s;
      position:relative; overflow:hidden;
    }
    .task-item:hover { box-shadow:0 6px 22px rgba(200,150,180,0.28); transform:translateY(-2px); }
    @keyframes fadeSlideIn {
      from { opacity:0; transform:translateY(18px) scale(0.94); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }
    .task-item.completing::after {
      content:''; position:absolute; inset:0;
      background:radial-gradient(circle at center, rgba(255,179,209,0.55) 0%, transparent 70%);
      animation:glowPulse 0.6s ease forwards; border-radius:inherit; pointer-events:none;
    }
    @keyframes glowPulse {
      0%   { opacity:0; transform:scale(0.8); }
      50%  { opacity:1; transform:scale(1.05); }
      100% { opacity:0; transform:scale(1.1); }
    }
    .task-item.done { background:rgba(255,255,255,0.35); border-color:rgba(255,255,255,0.5); }
    .task-item::before { content:''; width:4px; border-radius:4px; align-self:stretch; flex-shrink:0; }
    .task-item[data-p="low"]::before  { background:var(--low);  }
    .task-item[data-p="med"]::before  { background:var(--med);  }
    .task-item[data-p="high"]::before { background:var(--high); }
    .task-check { width:22px; height:22px; flex-shrink:0; accent-color:var(--pink-deep); cursor:pointer; }
    .task-text { flex:1; font-size:0.88rem; font-weight:600; color:var(--text); line-height:1.4; word-break:break-word; transition:color 0.3s; }
    .task-item.done .task-text { text-decoration:line-through; color:var(--text-soft); }
    .pri-tag { font-size:0.65rem; font-weight:700; padding:3px 8px; border-radius:50px; flex-shrink:0; }
    .pri-tag.low  { background:rgba(168,216,168,0.4); color:#3a6b3a; }
    .pri-tag.med  { background:rgba(255,203,164,0.4); color:#7a4f20; }
    .pri-tag.high { background:rgba(255,158,181,0.4); color:#7a1a30; }
    .del-btn { background:none; border:none; cursor:pointer; font-size:1rem; opacity:0.4; transition:opacity 0.2s, transform 0.2s; flex-shrink:0; padding:2px; line-height:1; }
    .del-btn:hover { opacity:1; transform:scale(1.25) rotate(10deg); }
    .empty-state { text-align:center; padding:32px 0 12px; color:var(--text-soft); font-size:0.88rem; font-weight:600; line-height:1.8; }
    .empty-icon  { font-size:3rem; display:block; margin-bottom:8px; }
    .sparkle { position:fixed; pointer-events:none; z-index:999; font-size:1.2rem; animation:sparklePop 0.7s ease forwards; }
    @keyframes sparklePop {
      0%   { transform:translate(0,0) scale(0); opacity:1; }
      60%  { transform:translate(var(--dx),var(--dy)) scale(1.2); opacity:1; }
      100% { transform:translate(var(--dx2),var(--dy2)) scale(0); opacity:0; }
    }
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--pink); border-radius:10px; }
  </style>
</head>
<body>

<div class="blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
</div>

<div class="floaties" id="floaties"></div>

<div class="card">
  <div class="header">
    <div class="title">My Cute To-Do ✨</div>
  </div>

  <div class="quote-box">
    <div class="quote-label">✦ daily vibe ✦</div>
    <div class="quote-text" id="quoteText"></div>
  </div>

  <div class="input-row">
    <input class="task-input" id="taskInput" type="text" placeholder="Add something cute… 🌸" maxlength="120" />
    <button class="add-btn" id="addBtn">＋</button>
  </div>

  <div class="priority-row">
    <button class="pri-btn" data-p="low">💗 low</button>
    <button class="pri-btn selected" data-p="med">🌸 medium</button>
    <button class="pri-btn" data-p="high">💔 high</button>
  </div>

  <div class="stats">
    <span class="stats-text" id="statsText">0 tasks</span>
    <button class="clear-btn" id="clearDoneBtn">clear done ✓</button>
  </div>

  <ul class="task-list" id="taskList"></ul>

  <div class="empty-state" id="emptyState">
    <span class="empty-icon">🌷</span>
    Nothing here yet!<br/>Add your first task above 💖
  </div>
</div>

<script>
  /* Daily Vibe Quotes */
  const quotes = [
    "You are doing amazing, sweetie 💖",
    "Small steps still count as progress 🌸",
    "Today is a good day to be proud of yourself ✨",
    "She believed she could, so she did 🦋",
    "Your vibe attracts your tribe 💫",
    "Bloom where you are planted 🌷",
    "Soft life era, bestie 🎀",
    "Progress over perfection, always 🌙",
    "Every day is a fresh start 🍓",
    "You've got this, girlie 💅✨",
  ];
  document.getElementById('quoteText').textContent = quotes[new Date().getDate() % quotes.length];

  /* Floating Emoji Particles */
  const emojis  = ['💖','✨','🌸','💜','⭐','🎀','🌷','💫','🦋','🍓'];
  const floaties = document.getElementById('floaties');
  function createFloaty() {
    const el = document.createElement('div');
    el.className = 'floaty';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left   = Math.random() * 100 + 'vw';
    el.style.bottom = '-60px';
    const dur = 12 + Math.random() * 14;
    const del = Math.random() * 8;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay   = del + 's';
    el.style.fontSize = (1 + Math.random()) + 'rem';
    floaties.appendChild(el);
    setTimeout(() => el.remove(), (dur + del) * 1000 + 200);
  }
  for (let i = 0; i < 10; i++) createFloaty();
  setInterval(createFloaty, 2200);

  /* State */
  let tasks = JSON.parse(localStorage.getItem('cuteTasks') || '[]');
  function save() { localStorage.setItem('cuteTasks', JSON.stringify(tasks)); }

  /* Priority Selector */
  let selectedPriority = 'med';
  document.querySelectorAll('.pri-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.pri-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedPriority = btn.dataset.p;
    });
  });

  /* Render */
  function render() {
    const list  = document.getElementById('taskList');
    const empty = document.getElementById('emptyState');
    const stats = document.getElementById('statsText');
    list.innerHTML = '';
    const total = tasks.length;
    const done  = tasks.filter(t => t.done).length;
    stats.textContent = total === 0 ? '0 tasks' : `${done} / ${total} done 💖`;
    empty.style.display = total === 0 ? 'block' : 'none';

    const priLabels = { low:'💗 low', med:'🌸 mid', high:'💔 high' };

    tasks.forEach((task, idx) => {
      const li = document.createElement('li');
      li.className = 'task-item' + (task.done ? ' done' : '');
      li.dataset.p = task.priority || 'med';
      const pc = task.priority || 'med';
      li.innerHTML = `
        <input type="checkbox" class="task-check" ${task.done ? 'checked' : ''} aria-label="Complete task"/>
        <span class="task-text">${escapeHtml(task.text)}</span>
        <span class="pri-tag ${pc}">${priLabels[pc]}</span>
        <button class="del-btn" aria-label="Delete task">🗑️</button>
      `;

      li.querySelector('.task-check').addEventListener('change', (e) => {
        tasks[idx].done = e.target.checked;
        save();
        if (tasks[idx].done) {
          li.classList.add('completing');
          spawnSparkles(e.target);
          setTimeout(() => li.classList.remove('completing'), 650);
          playChime();
        }
        li.classList.toggle('done', tasks[idx].done);
        const d = tasks.filter(t=>t.done).length;
        document.getElementById('statsText').textContent = `${d} / ${tasks.length} done 💖`;
      });

      li.querySelector('.del-btn').addEventListener('click', () => {
        li.style.transition = 'opacity 0.3s, transform 0.3s';
        li.style.opacity    = '0';
        li.style.transform  = 'scale(0.88) translateX(20px)';
        setTimeout(() => { tasks.splice(idx, 1); save(); render(); }, 300);
      });

      list.appendChild(li);
    });
  }

  /* Add Task */
  function addTask() {
    const input = document.getElementById('taskInput');
    const text  = input.value.trim();
    if (!text) {
      input.focus();
      input.style.borderColor = '#f582ae';
      setTimeout(() => input.style.borderColor = '', 800);
      return;
    }
    tasks.unshift({ id: Date.now(), text, done: false, priority: selectedPriority });
    save(); render();
    input.value = ''; input.focus();
    const btn = document.getElementById('addBtn');
    btn.classList.add('bounce');
    setTimeout(() => btn.classList.remove('bounce'), 380);
  }

  document.getElementById('addBtn').addEventListener('click', () => { addTask(); playChime(); });
  document.getElementById('taskInput').addEventListener('keydown', e => { if (e.key==='Enter') { addTask(); playChime(); } });
  document.getElementById('clearDoneBtn').addEventListener('click', () => { tasks = tasks.filter(t => !t.done); save(); render(); });

  /* Sparkles */
  const sparkleEmojis = ['✨','💖','⭐','🌸','💫','🎀'];
  function spawnSparkles(anchor) {
    const rect = anchor.getBoundingClientRect();
    const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
    for (let i = 0; i < 7; i++) {
      const el = document.createElement('div');
      el.className   = 'sparkle';
      el.textContent = sparkleEmojis[Math.floor(Math.random() * sparkleEmojis.length)];
      const angle = (Math.PI*2*i)/7 + Math.random()*0.5;
      const d1 = 40+Math.random()*40, d2 = 70+Math.random()*60;
      el.style.cssText = `left:${cx}px;top:${cy}px;
        --dx:${Math.cos(angle)*d1}px;--dy:${Math.sin(angle)*d1}px;
        --dx2:${Math.cos(angle)*d2}px;--dy2:${Math.sin(angle)*d2}px;
        animation-delay:${i*0.04}s;font-size:${0.9+Math.random()*0.7}rem;`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 800);
    }
  }

  /* Chime Sound */
  function playChime() {
    try {
      const ctx  = new (window.AudioContext || window.webkitAudioContext)();
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime+0.12);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.35);
      osc.start(); osc.stop(ctx.currentTime+0.35);
    } catch {}
  }

  /* Utility */
  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  render();
</script>
</body>
</html>
